name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - run: python scripts/validate.py
      - run: python scripts/generate_indices.py --check
      - run: python scripts/repo_status.py
      - run: python scripts/compose_context.py --target-framework verl --task "add SGLang rollout backend with weight sync" --mode design --output /tmp/context_bundle.md
      - run: python scripts/validate_context_bundle.py /tmp/context_bundle.md
      - run: pytest -q
